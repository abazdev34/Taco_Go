<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>БУРРИТОС</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0b0b0b" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo-192.png" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Montserrat", sans-serif;
        background: #0b0b0b;
        color: #ffffff;
      }

      #preloader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050505;
        transition: opacity 0.45s ease, visibility 0.45s ease;
      }

      #preloader.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loader {
        width: min(900px, 92vw);
        text-align: center;
        animation: loaderIn 0.5s ease both;
      }

      .loader-logo {
        width: 100%;
        max-height: 260px;
        object-fit: contain;
        display: block;
        margin: 0 auto 24px;
      }

      .loader-title {
        color: #f5d58f;
        font-size: clamp(22px, 5vw, 44px);
        line-height: 1;
        font-weight: 900;
        letter-spacing: 0.04em;
      }

      .loader-line {
        width: min(260px, 70vw);
        height: 6px;
        margin: 22px auto 0;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(245, 213, 143, 0.16);
      }

      .loader-line::before {
        content: "";
        display: block;
        width: 45%;
        height: 100%;
        border-radius: inherit;
        background: #f5d58f;
        animation: loadingMove 0.85s ease-in-out infinite alternate;
      }

      @keyframes loadingMove {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(125%);
        }
      }

      @keyframes loaderIn {
        from {
          opacity: 0;
          transform: scale(0.96);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @media (max-width: 640px) {
        .loader-logo {
          max-height: 160px;
          margin-bottom: 18px;
        }
      }
    </style>
  </head>

  <body>
    <div id="preloader">
      <div class="loader">
        <img class="loader-logo" src="/logo.png" alt="БУРРИТОС" />
        <div class="loader-title">БУРРИТОС</div>
        <div class="loader-line"></div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      const hidePreloader = () => {
        const loader = document.getElementById("preloader");
        if (!loader) return;

        loader.classList.add("hide");

        setTimeout(() => {
          loader.remove();
        }, 500);
      };

      window.addEventListener("load", () => {
        setTimeout(hidePreloader, 700);
      });

      setTimeout(hidePreloader, 2500);
    </script>
  </body>
</html>
